<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css"/>
    <title>Конвертер RUB → CNY</title>
</head>
<body>
<div class="container">
    <h1>Конвертер RUB → CNY</h1>

    <div class="rate-info" id="rateInfo">Загрузка курса ЦБ РФ...</div>

    <form id="converterForm">
        <div class="form-group">
            <label for="surname">Фамилия *</label>
            <input type="text" id="surname" name="surname" required placeholder="Иванов">
        </div>

        <div class="form-group">
            <label for="rubles">Сумма в рублях *</label>
            <input type="number" id="rubles" name="rubles" step="0.01" min="0" required placeholder="1000">
        </div>

        <button type="submit" id="submitBtn">Конвертировать и отправить</button>
    </form>

    <div class="result" id="result"></div>
</div>

<script src="index.js"></script>
</body>
</html>
